<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sudoku</title>
    <meta name="description"
        content="A professional Sudoku puzzle game with multiple difficulty levels, special puzzles, notes, and more.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ==================== MENU SCREEN ==================== -->
    <div id="menu-screen" class="screen active">
        <div class="menu-container">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">
                        <span>9</span>
                    </div>
                    <h1>SUDOKU</h1>
                </div>
                <p class="tagline">Challenge Your Mind</p>
            </div>

            <div class="menu-card">
                <h2>New Game</h2>
                <div class="difficulty-buttons" id="difficulty-buttons">
                    <button class="diff-btn" data-difficulty="easy">
                        <span class="diff-name">Easy</span>
                        <span class="diff-desc">Perfect for beginners</span>
                    </button>
                    <button class="diff-btn" data-difficulty="medium">
                        <span class="diff-name">Medium</span>
                        <span class="diff-desc">A balanced challenge</span>
                    </button>
                    <button class="diff-btn" data-difficulty="hard">
                        <span class="diff-name">Hard</span>
                        <span class="diff-desc">For experienced players</span>
                    </button>
                    <button class="diff-btn" data-difficulty="expert">
                        <span class="diff-name">Expert</span>
                        <span class="diff-desc">Test your mastery</span>
                    </button>
                    <button class="diff-btn" data-difficulty="insane">
                        <span class="diff-name">Insane</span>
                        <span class="diff-desc">Only the bravest dare</span>
                    </button>
                </div>
            </div>

            <div class="menu-card special-card">
                <h2>Special Puzzles</h2>
                <p class="special-subtitle">Famous hand-crafted puzzles from the masters</p>
                <div class="special-puzzles" id="special-puzzles">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== GAME SCREEN ==================== -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <!-- Header -->
            <div class="game-header">
                <div class="header-left">
                    <button id="btn-back" class="header-btn" title="Back to menu">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <span id="difficulty-label" class="difficulty-badge">Easy</span>
                </div>
                <div class="header-center">
                    <div class="mistakes-display" id="mistakes-display">
                        <span class="heart active" id="heart-0">❤</span>
                        <span class="heart active" id="heart-1">❤</span>
                        <span class="heart active" id="heart-2">❤</span>
                    </div>
                </div>
                <div class="header-right">
                    <span id="timer" class="timer-display">00:00</span>
                    <button id="btn-pause" class="header-btn" title="Pause (P)">
                        <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16" rx="1" />
                            <rect x="14" y="4" width="4" height="16" rx="1" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Sudoku Grid -->
            <div id="sudoku-grid" class="sudoku-grid">
                <!-- 81 cells generated by JS -->
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="number-pad" id="number-pad">
                    <!-- Generated by JS -->
                </div>
                <div class="action-buttons">
                    <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10" />
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                        </svg>
                        <span>Undo</span>
                    </button>
                    <button id="btn-erase" class="action-btn" title="Erase (Delete)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                            <line x1="18" y1="9" x2="12" y2="15" />
                            <line x1="12" y1="9" x2="18" y2="15" />
                        </svg>
                        <span>Erase</span>
                    </button>
                    <button id="btn-notes" class="action-btn toggle-btn" title="Notes (N)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                        <span>Notes</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== OVERLAYS ==================== -->

    <!-- Loading -->
    <div id="loading-overlay" class="overlay">
        <div class="overlay-content loading-content">
            <div class="spinner"></div>
            <p>Generating puzzle…</p>
        </div>
    </div>

    <!-- Pause -->
    <div id="pause-overlay" class="overlay">
        <div class="overlay-content pause-content">
            <h2>Paused</h2>
            <p>Take a break. The grid is hidden.</p>
            <button id="btn-resume" class="overlay-btn primary-btn">Resume</button>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameover-overlay" class="overlay">
        <div class="overlay-content gameover-content">
            <div class="gameover-icon">✕</div>
            <h2>Game Over</h2>
            <p>You made 3 mistakes</p>
            <p class="gameover-time" id="gameover-time"></p>
            <div class="overlay-buttons">
                <button id="btn-retry" class="overlay-btn primary-btn">Try Again</button>
                <button id="btn-gameover-menu" class="overlay-btn secondary-btn">Menu</button>
            </div>
        </div>
    </div>

    <!-- Victory -->
    <div id="victory-overlay" class="overlay">
        <div class="overlay-content victory-content">
            <div class="victory-icon">🏆</div>
            <h2>Congratulations!</h2>
            <p class="victory-difficulty" id="victory-difficulty"></p>
            <p class="victory-time" id="victory-time"></p>
            <p class="victory-mistakes" id="victory-mistakes"></p>
            <div class="overlay-buttons">
                <button id="btn-new-game" class="overlay-btn primary-btn">New Game</button>
                <button id="btn-victory-menu" class="overlay-btn secondary-btn">Menu</button>
            </div>
        </div>
    </div>

    <script src="sudoku.js"></script>
    <script src="app.js"></script>
</body>

</html>
